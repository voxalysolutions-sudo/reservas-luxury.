<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Reservas - Luxury Control Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f111a 0%, #151926 100%);
            --glass-bg: rgba(20, 24, 38, 0.65);
            --glass-border: rgba(255, 255, 255, 0.07);
            --glass-glow: rgba(99, 102, 241, 0.05);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-primary: #6366f1;
            --accent-hover: #4f46e5;
            --status-free: #10b981;
            --status-occupied: #ef4444;
            --status-waiting: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: #0b0d14;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(239, 68, 68, 0.08) 0px, transparent 50%),
                url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Header */
        header {
            background: rgba(11, 13, 20, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand i {
            font-size: 24px;
            color: var(--accent-primary);
            text-shadow: 0 0 12px rgba(99, 102, 241, 0.5);
        }

        .brand h1 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* Main Workspace Layout */
        .workspace {
            display: grid;
            grid-template-columns: 340px 1fr 360px;
            height: calc(100vh - 61px);
            overflow: hidden;
        }

        /* Sidebar Común Estilo Glassmorphism */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            display: flex;
            flex-direction: column;
            overflow-hidden;
        }

        /* COLUMNA IZQUIERDA: Timeline y Lista de Reservas */
        #left-timeline {
            border-right: 1px solid var(--glass-border);
        }

        .search-box {
            padding: 16px;
            border-bottom: 1px solid var(--glass-border);
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 14px 10px 36px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: white;
            font-size: 13px;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.2);
        }

        .search-box i {
            position: absolute;
            left: 28px;
            top: 29px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .timeline-section {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }

        .res-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .res-card:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-1px);
        }

        .res-card.active-card {
            border-color: var(--accent-primary);
            background: rgba(99, 102, 241, 0.1);
        }

        .res-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .res-name {
            font-weight: 600;
            font-size: 14px;
        }

        .res-time {
            font-size: 12px;
            font-weight: 600;
            color: var(--accent-primary);
            background: rgba(99, 102, 241, 0.15);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .res-meta {
            display: flex;
            gap: 12px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .res-meta span i {
            margin-right: 4px;
        }

        .badge-status {
            position: absolute;
            bottom: 12px;
            right: 12px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        /* COLUMNA CENTRAL: Control de Habitaciones y Canvas */
        #center-canvas {
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow: hidden;
        }

        /* Tabs de Zonas / Habitaciones estilo EatApp */
        .room-navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            padding: 6px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            margin-bottom: 20px;
        }

        .room-tabs {
            display: flex;
            gap: 6px;
        }

        .room-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .room-btn:hover {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }

        .room-btn.active-room {
            color: white;
            background: var(--accent-primary);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        /* Canvas del Mapa de Mesas */
        .floorplan-container {
            flex: 1;
            background: rgba(5, 7, 12, 0.4);
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            position: relative;
            background-image: 
                radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 24px 24px;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .floorplan-canvas {
            width: 800px;
            height: 550px;
            position: relative;
        }

        /* Mesas Mejoradas con Distintos Formatos y Tags de Clientes */
        .table-element {
            position: absolute;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
        }

        /* Formatos Geométricos de Mesas */
        .table-element.circle { border-radius: 50%; }
        .table-element.square { border-radius: 12px; }

        /* Estados de Mesas */
        .table-element.free {
            background: radial-gradient(circle, rgba(16, 185, 129, 0.25) 0%, rgba(16, 185, 129, 0.05) 100%);
            border-color: var(--status-free);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.15);
        }

        .table-element.occupied {
            background: radial-gradient(circle, rgba(239, 68, 68, 0.25) 0%, rgba(239, 68, 68, 0.05) 100%);
            border-color: var(--status-occupied);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.15);
        }

        .table-element.selected {
            border-color: white !important;
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.3) !important;
        }

        .table-id {
            font-weight: 700;
            font-size: 15px;
            color: white;
        }

        .table-cap {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* Mini Etiqueta de Cliente Flotante incorporada (Estilo EatApp) */
        .table-client-tag {
            position: absolute;
            bottom: -22px;
            background: rgba(11, 13, 20, 0.9);
            border: 1px solid var(--glass-border);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            white-space: nowrap;
            max-width: 90px;
            overflow: hidden;
            text-overflow: ellipsis;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            font-weight: 500;
        }

        /* COLUMNA DERECHA: Detalle y Operaciones */
        #right-details {
            border-left: 1px solid var(--glass-border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .panel-heading {
            font-size: 16px;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input, .form-group select {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 10px 12px;
            color: white;
            font-size: 13px;
            transition: all 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* Botón Premium */
        .btn-action {
            background: var(--accent-primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }

        .btn-action:hover {
            background: var(--accent-hover);
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            box-shadow: none;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: none;
        }

        /* Legend Indicators */
        .status-legends {
            display: flex;
            gap: 12px;
            font-size: 12px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
        }

        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <i class="fa-solid degradado fa-couch"></i>
            <h1>Voxaly Luxury Booking</h1>
        </div>
        <div class="status-legends">
            <div class="legend-item"><div class="legend-dot" style="background: var(--status-free)"></div>Disponibles</div>
            <div class="legend-item"><div class="legend-dot" style="background: var(--status-occupied)"></div>Ocupadas</div>
        </div>
    </header>

    <div class="workspace">
        
        <div id="left-timeline" class="glass-panel">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Buscar cliente o mesa...">
            </div>
            
            <div class="timeline-section">
                <div>
                    <div class="section-title">En Comedor (Sentados) <span>2</span></div>
                    <div class="res-card active-card" onclick="selectMockReservation('Mesa 1', 'Alexander Mendez', 4, '20:00')">
                        <div class="res-header">
                            <div class="res-name">Alexander Mendez</div>
                            <div class="res-time">M1</div>
                        </div>
                        <div class="res-meta">
                            <span><i class="fa-solid fa-users"></i> 4 Pax</span>
                            <span><i class="fa-regular fa-clock"></i> 20:00</span>
                        </div>
                        <div class="badge-status" style="background: var(--status-occupied)"></div>
                    </div>
                </div>

                <div>
                    <div class="section-title">Próximas Reservas <span>2</span></div>
                    <div style="display:flex; flex-direction:column; gap:8px;">
                        <div class="res-card" onclick="selectMockReservation('Mesa 3', 'Carlos Villa', 2, '21:30')">
                            <div class="res-header">
                                <div class="res-name">Carlos Villa</div>
                                <div class="res-time">M3</div>
                            </div>
                            <div class="res-meta">
                                <span><i class="fa-solid fa-users"></i> 2 Pax</span>
                                <span><i class="fa-regular fa-clock"></i> 21:30</span>
                            </div>
                            <div class="badge-status" style="background: var(--status-free)"></div>
                        </div>
                        
                        <div class="res-card" onclick="selectMockReservation('Mesa 4', 'Dra. Almonte', 6, '22:00')">
                            <div class="res-header">
                                <div class="res-name">Dra. Almonte</div>
                                <div class="res-time">M4</div>
                            </div>
                            <div class="res-meta">
                                <span><i class="fa-solid fa-users"></i> 6 Pax</span>
                                <span><i class="fa-regular fa-clock"></i> 22:00</span>
                            </div>
                            <div class="badge-status" style="background: var(--status-occupied)"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="center-canvas">
            <div class="room-navbar">
                <div class="room-tabs">
                    <button class="room-btn active-room">Salón Principal</button>
                    <button class="room-btn">La Terraza</button>
                    <button class="room-btn">Zona VIP</button>
                </div>
                <button class="room-btn btn-secondary" style="padding: 6px 12px;"><i class="fa-solid fa-layer-group"></i> Configurar</button>
            </div>

            <div class="floorplan-container">
                <div class="floorplan-canvas">
                    <div class="table-element circle occupied selected" style="width: 90px; height: 90px; left: 100px; top: 120px;" onclick="clickedTable(this, 'Mesa 1', 4, 'Alexander Mendez')">
                        <span class="table-id">M1</span>
                        <span class="table-cap">4 Pax</span>
                        <div class="table-client-tag">A. Mendez</div>
                    </div>

                    <div class="table-element circle free" style="width: 90px; height: 90px; left: 260px; top: 120px;" onclick="clickedTable(this, 'Mesa 2', 4, '')">
                        <span class="table-id">M2</span>
                        <span class="table-cap">4 Pax</span>
                    </div>

                    <div class="table-element circle free" style="width: 90px; height: 90px; left: 420px; top: 120px;" onclick="clickedTable(this, 'Mesa 3', 4, '')">
                        <span class="table-id">M3</span>
                        <span class="table-cap">4 Pax</span>
                    </div>

                    <div class="table-element square occupied" style="width: 100px; height: 90px; left: 100px; top: 320px;" onclick="clickedTable(this, 'Mesa 4', 6, 'Dra. Almonte')">
                        <span class="table-id">M4</span>
                        <span class="table-cap">6 Pax</span>
                        <div class="table-client-tag">Dra. Almonte</div>
                    </div>

                    <div class="table-element square free" style="width: 100px; height: 90px; left: 250px; top: 320px;" onclick="clickedTable(this, 'Mesa 5', 4, '')">
                        <span class="table-id">M5</span>
                        <span class="table-cap">4 Pax</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="right-details" class="glass-panel">
            <div class="panel-heading">
                <span id="detail-title">Mesa 1 Seleccionada</span>
                <i class="fa-solid fa-ellipsis-vertical" style="color: var(--text-muted); cursor:pointer;"></i>
            </div>

            <div class="form-group">
                <label>Estado de Ocupación</label>
                <select id="form-status" onchange="updateCurrentTableStatus()">
                    <option value="occupied">Ocupada / Reservada</option>
                    <option value="free">Disponible / Libre</option>
                </select>
            </div>

            <div class="form-group">
                <label>Nombre del Cliente</label>
                <input type="text" id="form-name" value="Alexander Mendez" placeholder="Ingresa el cliente...">
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label>Comensales (Pax)</label>
                    <input type="number" id="form-pax" value="4">
                </div>
                <div class="form-group">
                    <label>Hora de Llegada</label>
                    <input type="time" id="form-time" value="20:00">
                </div>
            </div>

            <div class="form-group" style="margin-top: auto;">
                <button class="btn-action" onclick="saveTableChanges()"><i class="fa-regular fa-floppy-disk"></i> Actualizar Plano</button>
                <button class="btn-action btn-secondary" onclick="alert('Espacio combinado correctamente')"><i class="fa-solid fa-arrows-spin"></i> Combinar Espacios</button>
            </div>
        </div>

    </div>

    <script>
        let currentSelectedElement = document.querySelector('.table-element.selected');

        function clickedTable(element, id, pax, client) {
            if(currentSelectedElement) {
                currentSelectedElement.classList.remove('selected');
            }
            element.classList.add('selected');
            currentSelectedElement = element;

            document.getElementById('detail-title').innerText = `${id} Seleccionada`;
            document.getElementById('form-name').value = client;
            document.getElementById('form-pax').value = pax;
            
            if(element.classList.contains('occupied')) {
                document.getElementById('form-status').value = 'occupied';
            } else {
                document.getElementById('form-status').value = 'free';
            }
        }

        function selectMockReservation(tableId, name, pax, time) {
            const elements = document.querySelectorAll('.table-element');
            elements.forEach(el => {
                if(el.querySelector('.table-id').innerText === tableId.replace('Mesa ', 'M')) {
                    clickedTable(el, tableId, pax, name);
                    document.getElementById('form-time').value = time;
                }
            });
        }

        function saveTableChanges() {
            if(!currentSelectedElement) return;
            
            const nameInput = document.getElementById('form-name').value;
            const paxInput = document.getElementById('form-pax').value;
            const statusInput = document.getElementById('form-status').value;

            currentSelectedElement.querySelector('.table-cap').innerText = `${paxInput} Pax`;

            let tag = currentSelectedElement.querySelector('.table-client-tag');
            
            if(statusInput === 'occupied') {
                currentSelectedElement.classList.remove('free');
                currentSelectedElement.classList.add('occupied');
                if(nameInput) {
                    if(!tag) {
                        tag = document.createElement('div');
                        tag.className = 'table-client-tag';
                        currentSelectedElement.appendChild(tag);
                    }
                    tag.innerText = nameInput;
                }
            } else {
                currentSelectedElement.classList.remove('occupied');
                currentSelectedElement.classList.add('free');
                if(tag) tag.remove();
            }

            alert("Plano de mesas actualizado con éxito de forma local.");
        }
    </script>
</body>
</html>
