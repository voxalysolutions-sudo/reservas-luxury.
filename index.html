<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Reservas - Luxury Control Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f111a 0%, #151926 100%);
            --glass-bg: rgba(20, 24, 38, 0.75);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-primary: #6366f1;
            --accent-hover: #4f46e5;
            --status-free: #10b981;
            --status-occupied: #ef4444;
            --status-reserved: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #0b0d14;
            background-image: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.12) 0px, transparent 50%), url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Header Restaurado con Acceso y Opciones */
        header {
            background: rgba(11, 13, 20, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand i {
            font-size: 22px;
            color: var(--accent-primary);
        }

        .header-menu {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .header-menu a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .header-menu a:hover, .header-menu a.active {
            color: white;
        }

        .btn-access {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--glass-border);
            padding: 8px 16px;
            border-radius: 8px;
            color: white;
            font-size: 13px;
            cursor: pointer;
            font-weight: 600;
        }

        /* Main Layout Workspace */
        .workspace {
            display: grid;
            grid-template-columns: 340px 1fr 360px;
            height: calc(100vh - 67px);
            overflow: hidden;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* COLUMNA IZQUIERDA */
        #left-timeline { border-right: 1px solid var(--glass-border); }

        .search-box {
            padding: 16px;
            border-bottom: 1px solid var(--glass-border);
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 14px 10px 36px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: white;
            font-size: 13px;
        }

        .search-box i {
            position: absolute;
            left: 28px;
            top: 29px;
            color: var(--text-muted);
        }

        .timeline-section {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .res-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            position: relative;
            margin-bottom: 8px;
            transition: transform 0.2s;
        }

        .res-card:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-1px);
        }

        .res-card.active-card {
            border-color: var(--accent-primary);
            background: rgba(99, 102, 241, 0.08);
        }

        .res-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .res-name { font-weight: 600; font-size: 14px; }
        .res-time {
            font-size: 11px;
            font-weight: 700;
            color: var(--accent-primary);
            background: rgba(99, 102, 241, 0.15);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .res-meta { display: flex; gap: 12px; font-size: 12px; color: var(--text-muted); }

        /* COLUMNA CENTRAL: Plano de Distribución */
        #center-canvas {
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow: hidden;
        }

        .room-navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            margin-bottom: 20px;
        }

        .room-tabs { display: flex; gap: 6px; }
        .room-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
        }

        .room-btn.active-room {
            color: white;
            background: var(--accent-primary);
        }

        .floorplan-container {
            flex: 1;
            background: rgba(5, 7, 12, 0.5);
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            position: relative;
            background-image: radial-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 24px 24px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .floorplan-canvas { width: 800px; height: 550px; position: relative; }

        /* ESTRUCTURA MESA GEOMÉTRICA ORIGINAL MEJORADA */
        .table-element {
            position: absolute;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 2px solid transparent;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .table-element.circle { border-radius: 50%; }
        .table-element.square { border-radius: 12px; }

        /* Estados Dinámicos de Colores Básicos y Reservados */
        .table-element.free {
            background: radial-gradient(circle, rgba(16, 185, 129, 0.2) 0%, rgba(16, 185, 129, 0.04) 100%);
            border-color: var(--status-free);
        }

        .table-element.occupied {
            background: radial-gradient(circle, rgba(239, 68, 68, 0.2) 0%, rgba(239, 68, 68, 0.04) 100%);
            border-color: var(--status-occupied);
        }

        .table-element.reserved {
            background: radial-gradient(circle, rgba(245, 158, 11, 0.2) 0%, rgba(245, 158, 11, 0.04) 100%);
            border-color: var(--status-reserved);
        }

        .table-element.selected {
            border-color: #ffffff !important;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255,255,255,0.25);
        }

        /* Línea de Enlace Visual para Combinaciones */
        .table-link-bridge {
            position: absolute;
            background: rgba(99, 102, 241, 0.3);
            border: 1px dashed var(--accent-primary);
            z-index: 1;
            pointer-events: none;
            transform-origin: top left;
        }

        .table-id { font-weight: 700; font-size: 15px; color: white; z-index: 2; }
        .table-cap { font-size: 11px; color: var(--text-muted); margin-top: 2px; z-index: 2; }
        
        .table-client-tag {
            position: absolute;
            bottom: -22px;
            background: rgba(11, 13, 20, 0.95);
            border: 1px solid var(--glass-border);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
            white-space: nowrap;
        }

        /* COLUMNA DERECHA */
        #right-details { border-left: 1px solid var(--glass-border); padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .panel-heading { font-size: 16px; font-weight: 700; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }
        
        .form-group input, .form-group select {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 10px 12px;
            color: white;
            font-size: 13px;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .btn-action {
            background: var(--accent-primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-action:hover { background: var(--accent-hover); }
        .btn-secondary { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.1); }
        .btn-merge-active { background: #ef4444 !important; animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <i class="fa-solid fa-couch"></i>
            <h1>Voxaly Luxury Control</h1>
        </div>
        <div class="header-menu">
            <a href="#" class="active">Panel</a>
            <a href="#">Clientes</a>
            <a href="#">Reportes</a>
            <button class="btn-access">Acceso Administrativo</button>
        </div>
    </header>

    <div class="workspace">
        
        <!-- Timeline Izquierda -->
        <div id="left-timeline" class="glass-panel">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Filtrar flujo de reservas...">
            </div>
            <div class="timeline-section">
                <div>
                    <div class="section-title">Ocupadas Actualmente</div>
                    <div id="timeline-list">
                        <!-- Renderizado Dinámico -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Escenario Central -->
        <div id="center-canvas">
            <div class="room-navbar">
                <div class="room-tabs">
                    <button class="room-btn active-room">Salón Principal</button>
                    <button class="room-btn">La Terraza</button>
                </div>
                <div style="font-size: 13px; color: var(--text-muted);"><i class="fa-regular fa-clock"></i> Live Synced</div>
            </div>

            <div class="floorplan-container">
                <div class="floorplan-canvas" id="canvas-container">
                    
                    <!-- Mesa 1 -->
                    <div id="table-M1" class="table-element circle occupied selected" style="width: 95px; height: 95px; left: 120px; top: 100px;" data-id="M1" data-pax="4" data-client="Alexander Mendez" data-status="occupied">
                        <span class="table-id">M1</span>
                        <span class="table-cap">4 Pax</span>
                        <div class="table-client-tag">A. Mendez</div>
                    </div>

                    <!-- Mesa 2 -->
                    <div id="table-M2" class="table-element circle free" style="width: 95px; height: 95px; left: 300px; top: 100px;" data-id="M2" data-pax="4" data-client="" data-status="free">
                        <span class="table-id">M2</span>
                        <span class="table-cap">4 Pax</span>
                    </div>

                    <!-- Mesa 3 -->
                    <div id="table-M3" class="table-element square reserved" style="width: 95px; height: 95px; left: 480px; top: 100px;" data-id="M3" data-pax="2" data-client="Carlos Villa" data-status="reserved">
                        <span class="table-id">M3</span>
                        <span class="table-cap">2 Pax</span>
                        <div class="table-client-tag">C. Villa</div>
                    </div>

                    <!-- Mesa 4 -->
                    <div id="table-M4" class="table-element square free" style="width: 100px; height: 95px; left: 120px; top: 300px;" data-id="M4" data-pax="6" data-client="" data-status="free">
                        <span class="table-id">M4</span>
                        <span class="table-cap">6 Pax</span>
                    </div>

                </div>
            </div>
        </div>

        <!-- Control Derecho -->
        <div id="right-details" class="glass-panel">
            <div class="panel-heading" id="detail-title">Mesa M1 Seleccionada</div>

            <div class="form-group">
                <label>Estado del Espacio</label>
                <select id="form-status" onchange="applyImmediateColorChange()">
                    <option value="free">🟢 Disponible / Libre</option>
                    <option value="occupied">🔴 Ocupada en Comedor</option>
                    <option value="reserved">🟡 Reservada</option>
                </select>
            </div>

            <div class="form-group">
                <label>Titular de Reserva</label>
                <input type="text" id="form-name" placeholder="Nombre completo">
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label>Comensales</label>
                    <input type="number" id="form-pax">
                </div>
                <div class="form-group">
                    <label>Hora</label>
                    <input type="time" id="form-time" value="20:00">
                </div>
            </div>

            <div class="form-group" style="margin-top: auto;">
                <button class="btn-action" onclick="saveAndSyncData()"><i class="fa-solid fa-cloud-arrow-up"></i> Actualizar Plano & Sheets</button>
                <button id="btn-merge" class="btn-action btn-secondary" onclick="toggleMergeMode()"><i class="fa-solid fa-link"></i> Combinar Espacios (Unir)</button>
            </div>
        </div>

    </div>

    <script>
        let selectedTable = document.getElementById('table-M1');
        let isMergeMode = false;

        // Inicializar eventos de clic en las mesas existentes
        document.querySelectorAll('.table-element').forEach(table => {
            table.addEventListener('click', function() {
                if (isMergeMode) {
                    executeTableMerge(this);
                } else {
                    selectNewTable(this);
                }
            });
        });

        function selectNewTable(element) {
            if(selectedTable) selectedTable.classList.remove('selected');
            element.classList.add('selected');
            selectedTable = element;

            // Rellenar formulario derecho
            document.getElementById('detail-title').innerText = `Mesa ${element.dataset.id} Seleccionada`;
            document.getElementById('form-status').value = element.dataset.status;
            document.getElementById('form-name').value = element.dataset.client;
            document.getElementById('form-pax').value = element.dataset.pax;
            
            applyImmediateColorChange();
        }

        // Cambio de Color Inmediato al interactuar con el selector
        function applyImmediateColorChange() {
            if(!selectedTable) return;
            const targetStatus = document.getElementById('form-status').value;
            
            selectedTable.classList.remove('free', 'occupied', 'reserved');
            selectedTable.classList.add(targetStatus);
        }

        // Lógica de Combinación Dinámica de Mesas
        function toggleMergeMode() {
            if(!selectedTable) return alert("Selecciona primero la mesa base.");
            isMergeMode = !isMergeMode;
            const btn = document.getElementById('btn-merge');
            if(isMergeMode) {
                btn.classList.add('btn-merge-active');
                btn.innerHTML = `<i class="fa-solid fa-circle-dot"></i> Selecciona otra mesa...`;
            } else {
                btn.classList.remove('btn-merge-active');
                btn.innerHTML = `<i class="fa-solid fa-link"></i> Combinar Espacios (Unir)`;
            }
        }

        function executeTableMerge(targetTable) {
            if(targetTable.id === selectedTable.id) {
                alert("No puedes unir una mesa consigo misma.");
                toggleMergeMode();
                return;
            }

            // Dibujar puente visual entre las dos capas
            const canvas = document.getElementById('canvas-container');
            const bridge = document.createElement('div');
            bridge.className = 'table-link-bridge';
            
            const x1 = parseFloat(selectedTable.style.left) + (parseFloat(selectedTable.style.width)/2);
            const y1 = parseFloat(selectedTable.style.top) + (parseFloat(selectedTable.style.height)/2);
            const x2 = parseFloat(targetTable.style.left) + (parseFloat(targetTable.style.width)/2);
            const y2 = parseFloat(targetTable.style.top) + (parseFloat(targetTable.style.height)/2);
            
            const distance = Math.sqrt(((x2 - x1) ** 2) + ((y2 - y1) ** 2));
            const angle = Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;

            bridge.style.width = `${distance}px`;
            bridge.style.height = `6px`;
            bridge.style.left = `${x1}px`;
            bridge.style.top = `${y1}px`;
            bridge.style.transform = `rotate(${angle}deg)`;
            
            canvas.appendChild(bridge);
            alert(`Mesas ${selectedTable.dataset.id} y ${targetTable.dataset.id} combinadas con éxito.`);
            toggleMergeMode();
            
            // Sincronizar unión con Google Sheets
            dispatchSheetsUpdate(selectedTable.dataset.id, "merged", { joinedWith: targetTable.dataset.id });
        }

        // GUARDAR DATOS Y CONECTAR CON WEBHOOK DE GOOGLE SHEETS
        function saveAndSyncData() {
            if(!selectedTable) return;

            const name = document.getElementById('form-name').value;
            const pax = document.getElementById('form-pax').value;
            const status = document.getElementById('form-status').value;

            // Actualizar Atributos del Nodo en el HTML
            selectedTable.dataset.client = name;
            selectedTable.dataset.pax = pax;
            selectedTable.dataset.status = status;

            selectedTable.querySelector('.table-cap').innerText = `${pax} Pax`;

            // Agregar o remover el tag flotante inferior
            let tag = selectedTable.querySelector('.table-client-tag');
            if(name && status !== 'free') {
                if(!tag) {
                    tag = document.createElement('div');
                    tag.className = 'table-client-tag';
                    selectedTable.appendChild(tag);
                }
                tag.innerText = name;
            } else {
                if(tag) tag.remove();
            }

            // Llamar la transmisión hacia Google Sheets
            dispatchSheetsUpdate(selectedTable.dataset.id, status, {
                cliente: name,
                comensales: pax,
                hora: document.getElementById('form-time').value
            });
            
            rebuildLeftTimeline();
        }

        // FUNCIÓN CONECTORA DE GOOGLE SHEETS (Sincronización mediante Webhook)
        function dispatchSheetsUpdate(tableId, status, payload) {
            // REEMPLAZA ESTA URL CON TU LINK DE WEBHOOK DE N8N O APP SCRIPT
            const WEBHOOK_URL = "https://tu-instancia-n8n.voxaly.solutions/webhook/reservas";

            console.log("Despachando actualización a Google Sheets:", { tableId, status, payload });

            fetch(WEBHOOK_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    mesa: tableId,
                    estado: status,
                    timestamp: new Date().toISOString(),
                    ...payload
                })
            })
            .then(res => console.log("Google Sheets Sincronizado"))
            .catch(err => console.warn("Modo simulación local activo. Configura WEBHOOK_URL para impactar la hoja real."));
        }

        function rebuildLeftTimeline() {
            const list = document.getElementById('timeline-list');
            list.innerHTML = "";
            document.querySelectorAll('.table-element').forEach(table => {
                if(table.dataset.status !== 'free' && table.dataset.client) {
                    list.innerHTML += `
                        <div class="res-card">
                            <div class="res-header">
                                <div class="res-name">${table.dataset.client}</div>
                                <div class="res-time">Mesa ${table.dataset.id}</div>
                            </div>
                            <div class="res-meta">
                                <span><i class="fa-solid fa-users"></i> ${table.dataset.pax} Comensales</span>
                            </div>
                        </div>`;
                }
            });
        }
        
        // Carga inicial
        rebuildLeftTimeline();
    </script>
</body>
</html>
