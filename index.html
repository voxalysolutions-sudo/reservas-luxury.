<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salón · Plano de Reservas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#0c1218; --panel:rgba(21,31,39,0.72); --panel-solid:#161f27; --panel-2:#1c2830; --panel-3:#22303a; --border:rgba(255,255,255,0.08); --border-strong:rgba(255,255,255,0.14); --text:#eef3f5; --text-dim:#8fa3ac; --text-faint:#5d7078; --gold:#cda15a; --gold-soft:rgba(205,161,90,0.16); --free:#5fae8d; --free-soft:rgba(95,174,141,0.18); --reserved:#c26654; --reserved-soft:rgba(194,102,84,0.18); --merged:#d9ab52; --radius-lg:18px; --radius-md:12px; --radius-sm:8px; }
  *{box-sizing:border-box;} html,body{height:100%;}
  body{ margin:0; background:radial-gradient(circle at 12% 8%, rgba(205,161,90,0.07), transparent 42%), radial-gradient(circle at 88% 92%, rgba(95,174,141,0.07), transparent 42%), var(--bg); color:var(--text); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; }
  h1,h2,h3,.brand-word{font-family:'Fraunces',serif;}
  .mono{font-family:'JetBrains Mono',monospace;}
  button{font-family:inherit;}
  input,select{font-family:inherit;}
  #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;}
  .login-wrap{position:relative;width:100%;max-width:900px;display:grid;grid-template-columns:1fr 1fr;gap:0;border-radius:22px;overflow:hidden;box-shadow:0 40px 100px rgba(0,0,0,0.55);border:1px solid var(--border);}
  .login-showcase{background:linear-gradient(165deg,#182029 0%, #101820 60%, #0c1116 100%);padding:44px 38px;display:flex;flex-direction:column;justify-content:space-between;position:relative;}
  .login-form-side{background:var(--panel-solid);padding:48px 42px;display:flex;flex-direction:column;justify-content:center;}
  #app{display:none;height:100vh;grid-template-columns:64px 288px 1fr 320px;grid-template-rows:60px 1fr;grid-template-areas:"nav top top top" "nav left center right";}
  #app.active{display:grid;}
  #topbar{grid-area:top; background:var(--panel-solid); border-bottom:1px solid var(--border); display:flex;align-items:center;justify-content:space-between; padding:0 22px;}
  #nav{grid-area:nav; background:var(--panel-solid); border-right:1px solid var(--border); display:flex;flex-direction:column;align-items:center; padding:16px 0;gap:6px;}
  #left-panel{grid-area:left; background:var(--panel-solid); border-right:1px solid var(--border); display:flex;flex-direction:column;overflow:hidden;}
  #center-panel{grid-area:center;display:flex;flex-direction:column;padding:18px;overflow:hidden;position:relative;}
  #zona-bar{display:flex;justify-content:space-between;align-items:center;background:var(--panel-2);border:1px solid var(--border);padding:6px;border-radius:11px;margin-bottom:14px;flex-shrink:0;}
  .zona-btn{background:transparent;border:none;color:var(--text-dim);padding:8px 14px;font-size:12.5px;font-weight:600;border-radius:7px;cursor:pointer;}
  .zona-btn.active-zona{color:#1a1305;background:var(--gold);}
  #plano-wrap{flex:1;position:relative;overflow:hidden;border-radius:16px;}
  #plano{position:absolute;inset:0; border-radius:16px; background-color:#0f1922; border:1px solid var(--border); overflow:hidden;}
  .mesa{position:absolute;cursor:pointer;user-select:none;z-index:5;transform:translate(-50%,-50%);}
  .shape{width:58px;height:58px;background:var(--free-soft);border:2.5px solid var(--free);border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;}
  #empty-plano{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;color:var(--text-dim);}
  #empty-plano.show{display:flex;}
</style>
</head>
<body>
<div id="login-screen">...</div>
<div id="app">
  <nav id="nav">...</nav>
  <header id="topbar">...</header>
  <aside id="left-panel">...</aside>
  <main id="center-panel">
    <div id="zona-bar">
      <div id="zona-tabs"></div>
      <div id="zona-status">...</div>
    </div>
    <div id="plano-wrap">
      <div id="plano">
        <div id="mesas-container"></div>
        <div id="empty-plano"><div>Aún no hay mesas en esta zona.</div></div>
      </div>
    </div>
  </main>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxqP8S-tDo_evZr1t7GRDNJtqqojcOEC6LBF9s9cMsaFXa8DDsev1Z6VD-GtqZavTKo/exec';
const state = { 
  restauranteId: null, mesas: [], reservas: [], zonaActiva: 'Todas', fecha: '',
};

function render() {
  renderZonaTabs();
  // Lógica de filtrado integrada
  const visibles = state.zonaActiva === 'Todas' ? state.mesas : state.mesas.filter(m => (m.zona || 'Salón Principal') === state.zonaActiva);
  renderPlano(visibles);
  // Llamar al resto de funciones de renderizado de tu UI original
}

function renderZonaTabs() {
  const zonas = ['Todas', ...new Set(state.mesas.map(m => m.zona || 'Salón Principal'))];
  const cont = document.getElementById('zona-tabs');
  cont.innerHTML = '';
  zonas.forEach(z => {
    const b = document.createElement('button');
    b.className = 'zona-btn' + (state.zonaActiva === z ? ' active-zona' : '');
    b.textContent = z;
    b.onclick = () => { state.zonaActiva = z; render(); };
    cont.appendChild(b);
  });
}

function renderPlano(mesas) {
  const cont = document.getElementById('mesas-container');
  const empty = document.getElementById('empty-plano');
  cont.innerHTML = '';
  if(mesas.length === 0) { empty.classList.add('show'); } 
  else {
    empty.classList.remove('show');
    mesas.forEach(m => {
       const div = document.createElement('div');
       div.className = 'mesa';
       div.style.left = m.pos_x + 'px';
       div.style.top = m.pos_y + 'px';
       div.innerHTML = `<div class="shape">${m.nombre}</div>`;
       cont.appendChild(div);
    });
  }
}
/* [RESTO DE TUS FUNCIONES ORIGINALES: cargarTodo, api, doLogin...] */
</script>
</body>
</html>
